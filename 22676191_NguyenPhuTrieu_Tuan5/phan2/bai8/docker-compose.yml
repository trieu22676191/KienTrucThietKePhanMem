version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_b8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
  app:
    image: node:18-alpine
    container_name: nodejs_b8
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && node index.js"
    depends_on:
      - mysql
