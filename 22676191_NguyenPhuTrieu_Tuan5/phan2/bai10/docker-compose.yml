version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_b10
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_b10:/var/lib/mysql

volumes:
  mysql_data_b10:
